name: swarnakar
description: Premium Jewellery Suite for Bangladeshi jewellery business.
publish_to: "none"

version: 2.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  animate_do: ^3.3.4
  rive: ^0.13.4
  intl: ^0.20.2
  connectivity_plus: ^6.0.3
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/rive/
    - assets/svg/

