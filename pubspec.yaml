name: swarnakar
description: Premium Jewellery Suite for Bangladeshi jewellery business.
publish_to: "none"

version: 2.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^13.2.5
  animate_do: ^4.2.0
  rive: ^0.13.20
  intl: ^0.20.2
  connectivity_plus: ^6.1.5
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.3.3
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  http: ^1.2.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/rive/
    - assets/svg/